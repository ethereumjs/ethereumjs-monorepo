name: Browser
on:
  workflow_call:
    inputs:
      dep-cache-key:
        required: true
        type: string
      submodule-cache-key:
          required: true
          type: string
  workflow_dispatch:
    inputs:
      dep-cache-key:
        required: false
        default: 'none'
      submodule-cache-key:
        required: false
        default: 'none'

env:
  cwd: ${{github.workspace}}
  # Keep in sync with package-lock.json playwright version.
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-browser
  cancel-in-progress: true

jobs:
  test-all-browser:
    if: contains(join(github.event.pull_request.labels.*.name, ' '), 'test no browser') == false
    runs-on: ubuntu-latest
    # Preinstalled Chromium (playwright@1.60.0) — no ~150MB download per run.
    # --user root: apt-get for zstd; browsers live in /ms-playwright (world-readable).
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --ipc=host --init --user root
    strategy:
      fail-fast: false
    steps:
      # actions/cache needs zstd inside the container to decompress caches saved on
      # the host runner (without it every restore is a miss and npm ci re-builds).
      - name: Install zstd for actions/cache
        run: apt-get update && apt-get install -y --no-install-recommends zstd

      # Same pattern as util-build et al.: PR CI restores the build job workspace
      # from cache; no checkout needed (git is not required for browser tests).
      - if: inputs.submodule-cache-key == 'none'
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - if: inputs.dep-cache-key != 'none'
        uses: actions/cache/restore@v4
        id: dep-cache
        with:
          path: ${{github.workspace}}
          key: ${{ inputs.dep-cache-key }}

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Require build cache (workflow_call)
        if: inputs.dep-cache-key != 'none' && steps.dep-cache.outputs.cache-hit != 'true'
        run: |
          echo "::error::Build cache was not restored (key: ${{ inputs.dep-cache-key }}). Browser tests expect deps from the build job."
          exit 1

      - name: Install dependencies (manual dispatch only)
        if: inputs.dep-cache-key == 'none'
        run: npm ci
        working-directory: ${{ github.workspace }}

      - if: inputs.submodule-cache-key != 'none'
        uses: actions/cache/restore@v4
        name: Restore ethereum-tests from cache if available
        id: submodules-cache
        with:
          path: ${{github.workspace}}/packages/ethereum-tests
          key: ${{ inputs.submodule-cache-key }}

      - run: npm run test:browser --workspaces --if-present

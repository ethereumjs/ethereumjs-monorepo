name: Browser
on:
  workflow_call:
    inputs:
      dep-cache-key:
        required: true
        type: string
      submodule-cache-key:
          required: true
          type: string
  workflow_dispatch:
    inputs:
      dep-cache-key:
        required: false
        default: 'none'
      submodule-cache-key:
        required: false
        default: 'none'

env:
  cwd: ${{github.workspace}}
  # Keep in sync with package-lock.json playwright version.
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-browser
  cancel-in-progress: true

jobs:
  test-all-browser:
    if: contains(join(github.event.pull_request.labels.*.name, ' '), 'test no browser') == false
    runs-on: ubuntu-latest
    # Preinstalled Chromium (playwright@1.60.0) — no ~150MB download per run.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --ipc=host --init
    strategy:
      fail-fast: false
    steps:
      # actions/checkout needs git in the container; without it, files are fetched via the
      # REST API and there is no .git directory (npm prepare then fails).
      - name: Install git
        run: apt-get update && apt-get install -y --no-install-recommends git

      # Restore node_modules/dist first; checkout below adds .git and tracked sources while
      # leaving gitignored cache contents (node_modules, dist) in place.
      - if: inputs.dep-cache-key != 'none'
        uses: actions/cache/restore@v4
        id: dep-cache
        with:
          path: ${{github.workspace}}
          key: ${{ inputs.dep-cache-key }}

      - uses: actions/checkout@v5
        with:
          submodules: ${{ inputs.submodule-cache-key == 'none' && 'recursive' || false }}

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies (cache miss)
        if: inputs.dep-cache-key == 'none' || steps.dep-cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: ${{ github.workspace }}

      - if: inputs.submodule-cache-key != 'none'
        uses: actions/cache/restore@v4
        name: Restore ethereum-tests from cache if available
        id: submodules-cache
        with:
          path: ${{github.workspace}}/packages/ethereum-tests
          key: ${{ inputs.submodule-cache-key }}

      - run: npm run test:browser --workspaces --if-present

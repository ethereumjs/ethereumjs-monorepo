name: Browser
on:
  workflow_call:
    inputs:
      dep-cache-key:
        required: true
        type: string
      submodule-cache-key:
          required: true
          type: string
  workflow_dispatch:
    inputs:
      dep-cache-key:
        required: false
        default: 'none'
      submodule-cache-key:
        required: false
        default: 'none'

env:
  cwd: ${{github.workspace}}
  # Keep in sync with package-lock.json playwright version.
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-browser
  cancel-in-progress: true

jobs:
  test-all-browser:
    if: contains(join(github.event.pull_request.labels.*.name, ' '), 'test no browser') == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      # Deps/cache on the host runner (same pattern as util-build et al.).
      # actions/cache cannot reliably restore host-created caches inside a
      # container job, even with zstd installed — restore here, test in Docker.
      # CI fix: always checkout so the lockfile is present for setup-node's
      # `cache: 'npm'`. The workspace dep-cache restore further down can miss
      # for fresh PRs and would otherwise leave the workspace empty.
      - uses: actions/checkout@v5
        with:
          submodules: ${{ inputs.submodule-cache-key == 'none' && 'recursive' || '' }}

      - if: inputs.dep-cache-key != 'none'
        uses: actions/cache/restore@v4
        id: dep-cache
        with:
          path: ${{github.workspace}}
          key: ${{ inputs.dep-cache-key }}

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies (if not restored from cache)
        if: steps.dep-cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: ${{ github.workspace }}

      - if: inputs.submodule-cache-key != 'none'
        uses: actions/cache/restore@v4
        name: Restore ethereum-tests from cache if available
        id: submodules-cache
        with:
          path: ${{github.workspace}}/packages/ethereum-tests
          key: ${{ inputs.submodule-cache-key }}

      # Preinstalled Chromium (playwright@1.60.0) — no ~150MB download per run.
      - name: Run browser tests (Playwright container)
        run: |
          docker run --rm \
            --ipc=host \
            --init \
            --user root \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
            -e CI=true \
            mcr.microsoft.com/playwright:v1.60.0-noble \
            npm run test:browser --workspaces --if-present

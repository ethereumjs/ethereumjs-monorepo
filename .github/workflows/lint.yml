name: Lint
on:
  workflow_call:
    inputs:
      dep-cache-key:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      dep-cache-key:
        required: false
        default: 'none'
      submodule-cache-key:
        required: false
        default: 'none'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-lint
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # We clone the repo and submodules if triggered from work-flow dispatch
      # EIP-CI fix: always checkout so the lockfile is present for setup-node's
      # `cache: 'npm'`. The workspace dep-cache restore further down can miss
      # for fresh PRs and would otherwise leave the workspace empty.
      - uses: actions/checkout@v5

      # We restore the code/deps from cache if triggered from workflow_call (i.e. have valid cache key)
      - if: inputs.dep-cache-key != 'none'
        uses: actions/cache/restore@v4
        id: dep-cache
        with:
          path: ${{github.workspace}}
          key: ${{ inputs.dep-cache-key }}

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies (if not restored from cache)
        if: steps.dep-cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: ${{ github.workspace }}


      # TODO(typescript-7): typescript-eslint has no TypeScript 7 compatible
      # release yet — its type-aware parser crashes against the TS 7 compiler
      # API. Keep lint non-blocking until upstream ships TS 7 support, then
      # remove `continue-on-error`.
      - run: npm run lint
        continue-on-error: true
        working-directory: ${{ github.workspace }}
